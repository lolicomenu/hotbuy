<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GIRAFULL Calling Shinjuku Hot Buy List</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#f4f7fb;
      --card:#ffffff;
      --fg:#142033;
      --muted:#65758b;
      --line:#d8e1ee;
      --head:#eef4fb;
      --accent:#2563eb;
      --accent-fg:#ffffff;
      --wanted:#d91546;
      --shadow:0 10px 30px rgba(20,32,51,.10);
    }

    body.dark {
      --bg:#0b0f14;
      --card:#121821;
      --fg:#e6edf3;
      --muted:#9fb0c5;
      --line:#243040;
      --head:#172231;
      --accent:#3ea6ff;
      --accent-fg:#06111f;
      --wanted:#ff5f7e;
      --shadow:0 10px 30px rgba(0,0,0,.32);
    }

    * { box-sizing:border-box; }
    html, body { min-height:100%; }
    body {
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans JP",sans-serif;
      transition:background .2s ease,color .2s ease;
    }

    .wrap {
      max-width:1100px;
      margin:0 auto;
      padding:24px;
    }

    .header {
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    h1 {
      margin:0;
      font-size:28px;
      letter-spacing:.02em;
      line-height:1.2;
    }

    .sub {
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
    }


    .title-block {
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    .brand-line {
      font-size:16px;
      font-weight:800;
      letter-spacing:.04em;
      line-height:1.15;
    }

    .hot-title-row {
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:nowrap;
    }

    .gf-logo {
      width:48px;
      height:auto;
      object-fit:contain;
      flex:0 0 auto;
      display:block;
    }

    .logo-dark { display:none; }
    body.dark .logo-light { display:none; }
    body.dark .logo-dark { display:block; }

    .spacer { flex:1; }

    button, input, select {
      font:inherit;
      border-radius:10px;
      border:1px solid var(--line);
      background:var(--card);
      color:var(--fg);
      padding:10px 12px;
      outline:none;
    }

    button {
      cursor:pointer;
      background:var(--accent);
      color:var(--accent-fg);
      border-color:transparent;
      font-weight:700;
    }

    button.secondary {
      background:var(--card);
      color:var(--fg);
      border-color:var(--line);
    }

    .card {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:16px;
    }

    .controls {
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    #searchInput {
      flex:1;
      min-width:260px;
    }

    .count {
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
    }

    .table-wrap {
      width:100%;
      overflow-x:auto;
      border-radius:14px;
      border:1px solid var(--line);
    }

    table {
      width:100%;
      border-collapse:collapse;
      min-width:680px;
    }

    th, td {
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:middle;
    }

    th {
      background:var(--head);
      color:var(--fg);
      font-size:14px;
      font-weight:800;
      white-space:nowrap;
      position:sticky;
      top:0;
      z-index:1;
    }

    td {
      font-size:15px;
    }

    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover { background:color-mix(in srgb, var(--accent) 7%, transparent); }

    .name {
      font-weight:800;
      white-space:normal;
      min-width:360px;
    }

    .kana {
      color:var(--muted);
      white-space:normal;
      min-width:220px;
    }

    .wanted {
      color:var(--wanted);
      font-size:20px;
      font-weight:900;
      text-align:right;
      width:120px;
    }

    .empty {
      text-align:center;
      color:var(--muted);
      padding:34px 12px;
    }

    .pager {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-top:16px;
      flex-wrap:wrap;
    }

    .pager button { min-width:84px; }
    .pager .page-info { color:var(--muted); font-size:13px; }

    @media (max-width:700px) {
      .wrap { padding:16px; }
      h1 { font-size:22px; }
      th,td { padding:12px; }
      .name { min-width:260px; }
    }


    /* ===== スマホ表示：自動でカード型レイアウトに切替 ===== */
    @media (max-width: 760px) {
      .wrap {
        width: 100%;
        max-width: none;
        padding: 18px 12px;
      }

      .header {
        align-items: flex-start;
        gap: 10px;
      }

      h1 {
        font-size: 28px;
      }

      .brand-line {
        font-size: 14px;
      }

      .gf-logo {
        width: 42px;
      }

      .sub {
        font-size: 14px;
      }

      #themeToggle {
        padding: 12px 14px;
        font-size: 15px;
        white-space: nowrap;
      }

      .card {
        padding: 12px;
        border-radius: 20px;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      #searchInput {
        grid-column: 1 / -1;
        width: 100%;
        min-width: 0;
        font-size: 16px;
        padding: 14px 14px;
      }

      #sortSelect {
        width: 100%;
        min-width: 0;
        font-size: 16px;
        padding: 13px 12px;
      }

      #clearBtn {
        min-width: 92px;
        font-size: 16px;
        padding: 13px 14px;
      }

      .count {
        grid-column: 1 / -1;
        font-size: 13px;
        text-align: right;
      }

      .table-wrap {
        overflow-x: visible;
        border-radius: 16px;
      }

      table {
        min-width: 0;
        width: 100%;
      }

      thead {
        display: none;
      }

      tbody {
        display: block;
      }

      tbody tr {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px 12px;
        padding: 14px;
        border-bottom: 1px solid var(--line);
      }

      tbody tr:last-child {
        border-bottom: none;
      }

      th, td {
        border-bottom: none;
        padding: 0;
      }

      td {
        font-size: 14px;
      }

      .name {
        grid-column: 1 / -1;
        min-width: 0;
        width: 100%;
        font-size: 16px;
        line-height: 1.45;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .kana {
        grid-column: 1 / 2;
        min-width: 0;
        width: 100%;
        font-size: 13px;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .kana::before {
        content: "カナ：";
        color: var(--muted);
        font-weight: 700;
      }

      .wanted {
        grid-column: 2 / 3;
        grid-row: 2 / 3;
        width: auto;
        min-width: 88px;
        text-align: right;
        font-size: 20px;
        align-self: start;
      }

      .wanted::before {
        content: "Wanted";
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        margin-bottom: 2px;
      }

      .pager {
        gap: 10px;
      }

      .pager button {
        flex: 1;
        min-width: 0;
        padding: 12px 10px;
      }

      .pager .page-info {
        width: 100%;
        text-align: center;
        order: -1;
      }
    }

    @media (max-width: 390px) {
      .wrap { padding: 14px 10px; }
      h1 { font-size: 26px; }
      #themeToggle { font-size: 14px; padding: 10px 12px; }
      .name { font-size: 15px; }
      .wanted { font-size: 18px; min-width: 78px; }
    }

  </style>
</head>

          <option value="name_asc">カード名 A→Z</option>
        </select>
        <button id="clearBtn" class="secondary" type="button">クリア</button>
        <span id="count" class="count"></span>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>カード名</th>
              <th>カナ</th>
              <th style="text-align:right;">Wanted</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <div class="pager">
        <button id="prevBtn" class="secondary" type="button">前へ</button>
        <span id="pageInfo" class="page-info"></span>
        <button id="nextBtn" class="secondary" type="button">次へ</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://sddzrpaiobrwpczzwhxv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkZHpycGFpb2Jyd3Bjenp3aHh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU0OTYxMTEsImV4cCI6MjA3MTA3MjExMX0.qZ88_mnWutdLVttboeztwKiw0IU1736zng99qtA_CZk";
    const TABLE_NAME = "cards_api_v2";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");
    const clearBtn = document.getElementById("clearBtn");
    const rowsEl = document.getElementById("rows");
    const countEl = document.getElementById("count");
    const pageInfo = document.getElementById("pageInfo");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const themeToggle = document.getElementById("themeToggle");

    let currentPage = 1;
    let pageSize = 100;
    let totalCount = 0;
    let searchTimer = null;
    let reqId = 0;
    let composing = false;

    function applySavedTheme() {
      const saved = localStorage.getItem("wanted-list-theme") || "light";
      document.body.classList.toggle("dark", saved === "dark");
      themeToggle.textContent = saved === "dark" ? "ライトモード" : "ダークモード";
    }

    themeToggle.addEventListener("click", () => {
      const next = document.body.classList.contains("dark") ? "light" : "dark";
      localStorage.setItem("wanted-list-theme", next);
      applySavedTheme();
    });

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escOrTerm(s) {
      return String(s).replace(/,/g, "\,").replace(/[()]/g, "");
    }

    async function loadData() {
      const myId = ++reqId;
      const keyword = searchInput.value.trim();
      const from = (currentPage - 1) * pageSize;
      const to = from + pageSize - 1;

      let query = client
        .from(TABLE_NAME)
        .select("name, kana, wanted", { count: "exact" })
        .gt("wanted", 0)
        .range(from, to);

      if (keyword) {
        const terms = keyword.split(/\s+/).filter(Boolean);
        for (const term of terms) {
          const s = escOrTerm(term);
          query = query.or(`name.ilike.%${s}%,kana.ilike.%${s}%`);
        }
      }

      const sortValue = sortSelect.value;
      if (sortValue === "buy_desc") {
        // 表示しているWanted金額を降順にする
        query = query
          .order("wanted", { ascending: false })
          .order("kana", { ascending: true })
          .order("name", { ascending: true });
      } else if (sortValue === "name_asc") {
        query = query.order("kana", { ascending: true }).order("name", { ascending: true });
      }

      const { data, error, count } = await query;
      if (myId !== reqId) return;

      if (error) {
        console.error(error);
        rowsEl.innerHTML = `<tr><td colspan="3" class="empty">読み込みに失敗しました：${escapeHtml(error.message)}</td></tr>`;
        return;
      }

      totalCount = count || 0;
      renderRows(data || []);
      updatePager();
    }

    function renderRows(rows) {
      if (!rows.length) {
        rowsEl.innerHTML = `<tr><td colspan="3" class="empty">現在Wanted対象はありません</td></tr>`;
        return;
      }

      rowsEl.innerHTML = rows.map(r => `
        <tr>
          <td class="name">${escapeHtml(r.name)}</td>
          <td class="kana">${escapeHtml(r.kana)}</td>
          <td class="wanted">${Number(r.wanted || 0).toLocaleString("ja-JP")}</td>
        </tr>
      `).join("");
    }

    function updatePager() {
      const totalPages = Math.max(1, Math.ceil(totalCount / pageSize));
      if (currentPage > totalPages) {
        currentPage = totalPages;
        loadData();
        return;
      }

      countEl.textContent = `全${totalCount.toLocaleString("ja-JP")}件`;
      pageInfo.textContent = `${currentPage} / ${totalPages}ページ`;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
    }

    function resetPageAndLoad() {
      currentPage = 1;
      loadData();
    }

    searchInput.addEventListener("compositionstart", () => composing = true);
    searchInput.addEventListener("compositionend", () => {
      composing = false;
      resetPageAndLoad();
    });

    searchInput.addEventListener("input", () => {
      if (composing) return;
      clearTimeout(searchTimer);
      searchTimer = setTimeout(resetPageAndLoad, 250);
    });

    sortSelect.addEventListener("change", resetPageAndLoad);

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      resetPageAndLoad();
    });

    prevBtn.addEventListener("click", () => {
      if (currentPage > 1) {
        currentPage--;
        loadData();
      }
    });

    nextBtn.addEventListener("click", () => {
      const totalPages = Math.max(1, Math.ceil(totalCount / pageSize));
      if (currentPage < totalPages) {
        currentPage++;
        loadData();
      }
    });

    applySavedTheme();
    loadData();
  </script>
</body>
</html>
